{{- if .Values.vault.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sftp.vaultSvc" . }}
  labels:
    {{- include "sftp.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sftp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vault
  template:
    metadata:
      labels:
        {{- include "sftp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vault
    spec:
      containers:
        - name: vault
          image: {{ .Values.vault.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: {{ .Values.vault.devRootToken | quote }}
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: {{ .Values.vault.devListen | quote }}
          ports:
            - containerPort: {{ .Values.vault.service.port }}
              name: http
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sftp.vaultSvc" . }}
  labels:
    {{- include "sftp.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "sftp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vault
  ports:
    - name: http
      port: {{ .Values.vault.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}

