{{- if .Values.webUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sftp.fullname" . }}-web-ui
  labels:
    {{- include "sftp.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-ui
spec:
  replicas: {{ .Values.webUi.replicaCount }}
  selector:
    matchLabels:
      {{- include "sftp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        {{- include "sftp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web-ui
    spec:
      containers:
        - name: web-ui
          image: "{{ .Values.webUi.image.repository }}:{{ .Values.webUi.image.tag }}"
          imagePullPolicy: {{ .Values.webUi.image.pullPolicy }}
          env:
            - name: ADMIN_API_BASE_URL
              value: "http://{{ include "sftp.fullname" . }}-admin-api:{{ .Values.adminApi.service.port }}"
          ports:
            - name: http
              containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sftp.fullname" . }}-web-ui
  labels:
    {{- include "sftp.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-ui
spec:
  type: {{ .Values.webUi.service.type }}
  selector:
    {{- include "sftp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web-ui
  ports:
    - name: http
      port: {{ .Values.webUi.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}

